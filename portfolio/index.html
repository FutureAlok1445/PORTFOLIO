<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+JP:wght@300;400&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/anime-effects.css">
    
    <!-- GSAP 3.12.2 from CDNJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Flip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
    
    <!-- Note: ScrambleTextPlugin and CustomEase are premium Club GSAP plugins. 
         These URLs might point to trial versions if available, or just standard versions if hostable.
         Often for development on CodePen/local, there are trial URLs (assets.codepen.io), 
         but for production they require membership. We will comment these to prevent CDN 404s,
         but you can inject your valid copies here. -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrambleTextPlugin.min.js"></script> -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script> -->

    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>
</head>
<body>

    <!-- Boot Screen -->
    <section id="boot-screen" class="section-boot">
        <div class="boot-content">
            <p class="boot-line">&gt; initializing biosphere...</p>
            <p class="boot-line">&gt; loading neural weights... [████████] 100%</p>
            <p class="boot-line">&gt; mounting earth-cinematic theme...</p>
            <p class="boot-line">&gt; importing anime-atmosphere.module...</p>
            <p class="boot-line">&gt; render ready.</p>
        </div>
    </section>

    <!-- Hero Section -->
    <header id="hero" class="section-hero">
        <div class="hero-bg z10"></div>
        <div class="hero-topographic z20">
            <svg width="100%" height="100%" preserveAspectRatio="none">
                <path class="topo-line line-1" d="M0 100 Q 200 50 400 100 T 800 100 T 1200 100 T 1600 100 T 2000 100" fill="none" />
                <path class="topo-line line-2" d="M0 300 Q 250 200 500 300 T 1000 300 T 1500 300 T 2000 300" fill="none" />
                <path class="topo-line line-3" d="M0 500 Q 300 400 600 500 T 1200 500 T 1800 500 T 2400 500" fill="none" />
                <path class="topo-line line-4" d="M0 700 Q 350 550 700 700 T 1400 700 T 2100 700" fill="none" />
            </svg>
        </div>
        <div id="spline-container" class="z30"></div>
        <div class="hero-math-symbols z40">
            <span class="symbol">∂</span>
            <span class="symbol">∑</span>
            <span class="symbol">∫</span>
            <span class="symbol">θ</span>
            <span class="symbol">0</span>
            <span class="symbol">1</span>
        </div>
        <canvas id="sakura" class="z60"></canvas>
        <div class="hero-content z50">
            <div class="hero-ethereal-ray"></div>
            <h1 id="hero-name">YOUR NAME</h1>
            <div class="hero-tagline-wrapper">
                <p id="hero-tagline"></p><span class="cursor">_</span>
            </div>
            <p id="hero-terminal"></p>
            <div class="scroll-indicator">
                <span>[ SCROLL TO EXPLORE ]</span>
                <svg class="chevron" viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content Array -->
    <main>
        <!-- About Section -->
        <section id="about" class="section-about">
            <div class="container">
                <!-- About details -->
            </div>
        </section>

        <!-- Lab Section -->
        <section id="lab" class="section-lab">
            <div class="container">
                <!-- Experimental tech / lab area -->
            </div>
        </section>

        <!-- Journey / Timeline Section -->
        <section id="journey" class="section-journey">
            <div class="container">
                <!-- Timeline/Journey content -->
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="section-skills">
            <div class="container">
                <!-- Skills content -->
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="section-projects">
            <div class="container">
                <!-- Featured projects -->
            </div>
        </section>
    </main>

    <!-- Contact Section / Footer -->
    <footer id="contact" class="section-contact">
        <div class="container">
            <!-- Contact form, links, etc. -->
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/three-scene.js"></script>
    <script type="module" src="js/anime-effects.js"></script>
    <script type="module" src="js/scroll-triggers.js"></script>
    <script type="module" src="js/interactions.js"></script>
    <script type="module" src="js/hero.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
